<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your basket — AgriConnect</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="nav-mount"></div>

<section class="dash-header">
    <div class="container">
        <h1>Your basket</h1>
        <p>Review what you're ordering before checkout.</p>
    </div>
</section>

<section class="section" style="padding-top:32px">
    <div class="container">
        <div class="grid" style="grid-template-columns: 2fr 1fr; align-items:start;" id="cart-layout">
            <div class="card" id="cart-items-card">
                <div id="cart-items"></div>
            </div>

            <div class="card" id="checkout-card">
                <h3 style="margin-top:0">Checkout</h3>
                <div id="alert" class="alert alert-error"></div>
                <div class="field">
                    <label for="deliveryAddress">Delivery address</label>
                    <textarea id="deliveryAddress" rows="3" placeholder="Full delivery address"></textarea>
                </div>
                <div class="field">
                    <label for="contactPhone">Contact phone</label>
                    <input type="tel" id="contactPhone" placeholder="98765 43210">
                </div>
                <div class="route-divider" style="margin:20px 0"></div>
                <div class="flex-between" style="margin-bottom:10px;">
                    <span class="muted">Items</span>
                    <span class="mono" id="summary-count">0</span>
                </div>
                <div class="flex-between" style="margin-bottom:18px; font-weight:700; font-size:1.1rem;">
                    <span>Total</span>
                    <span class="mono" id="summary-total">₹0.00</span>
                </div>
                <button class="btn btn-primary btn-block" id="checkout-btn">Place order</button>
            </div>
        </div>
    </div>
</section>

<footer>
    <div class="container">
        <div>🌱 AgriConnect — Farm to customer platform</div>
        <div><a href="/marketplace.html">Continue shopping</a></div>
    </div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
    renderNav('marketplace');

    function renderCart() {
        const items = Cart.getItems();
        const container = document.getElementById('cart-items');
        const checkoutBtn = document.getElementById('checkout-btn');

        if (!items.length) {
            container.innerHTML = `<div class="empty-state"><div class="icon">🧺</div>Your basket is empty.<br><br><a href="/marketplace.html" class="btn btn-accent">Browse the marketplace</a></div>`;
            checkoutBtn.disabled = true;
        } else {
            checkoutBtn.disabled = false;
            container.innerHTML = `
                <table>
                    <thead><tr><th>Item</th><th>Price</th><th>Qty</th><th>Subtotal</th><th></th></tr></thead>
                    <tbody>
                    ${items.map(i => `
                        <tr>
                            <td><strong>${i.name}</strong><br><span class="muted" style="font-size:0.82rem">${i.farmerName || ''}</span></td>
                            <td class="mono">${formatMoney(i.price)}/${i.unit}</td>
                            <td><input type="number" min="1" value="${i.quantity}" class="qty-input" onchange="changeQty(${i.productId}, this.value)"></td>
                            <td class="mono">${formatMoney(i.price * i.quantity)}</td>
                            <td><button class="btn btn-outline btn-sm" onclick="removeItem(${i.productId})">Remove</button></td>
                        </tr>
                    `).join('')}
                    </tbody>
                </table>
            `;
        }

        document.getElementById('summary-count').textContent = Cart.count();
        document.getElementById('summary-total').textContent = formatMoney(Cart.total());
    }

    function changeQty(productId, value) {
        const qty = Math.max(1, parseInt(value || '1', 10));
        Cart.updateQuantity(productId, qty);
        renderCart();
    }

    function removeItem(productId) {
        Cart.remove(productId);
        renderCart();
        showToast('Removed from basket');
    }

    document.getElementById('checkout-btn').addEventListener('click', async () => {
        if (!Auth.isLoggedIn()) {
            showToast('Please log in to check out', true);
            window.location.href = '/login.html';
            return;
        }
        if (!Auth.isCustomer()) {
            showToast('Only customer accounts can place orders', true);
            return;
        }

        const alertBox = document.getElementById('alert');
        alertBox.classList.remove('show');

        const deliveryAddress = document.getElementById('deliveryAddress').value.trim();
        if (!deliveryAddress) {
            alertBox.textContent = 'Please enter a delivery address.';
            alertBox.classList.add('show');
            return;
        }

        const items = Cart.getItems();
        const btn = document.getElementById('checkout-btn');
        btn.disabled = true;
        btn.textContent = 'Placing order…';

        try {
            const order = await api('/orders', 'POST', {
                deliveryAddress,
                contactPhone: document.getElementById('contactPhone').value.trim(),
                items: items.map(i => ({ productId: i.productId, quantity: i.quantity }))
            });
            Cart.clear();
            showToast('Order placed! Thank you for supporting local farms.');
            window.location.href = '/orders.html';
        } catch (err) {
            alertBox.textContent = err.message;
            alertBox.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Place order';
        }
    });

    renderCart();
</script>
</body>
</html>
