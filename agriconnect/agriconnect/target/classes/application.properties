spring.application.name=AgriConnect

# ==============================
# MySQL Configuration (default / production)
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/agriconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Blessy21!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Seed data (categories) is only inserted once; safe to leave enabled
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

server.port=8080

# ==============================
# To run with H2 in-memory DB instead (zero setup, good for quick testing),
# comment out the MySQL block above and uncomment the block below:
# ==============================
# spring.datasource.url=jdbc:h2:mem:agriconnect;DB_CLOSE_DELAY=-1;MODE=MySQL
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
