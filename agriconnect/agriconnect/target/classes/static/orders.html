<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My orders — AgriConnect</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="nav-mount"></div>

<section class="dash-header">
    <div class="container">
        <h1>My orders</h1>
        <p>Track everything you've ordered from local farms.</p>
    </div>
</section>

<section class="section" style="padding-top:32px">
    <div class="container">
        <div id="orders-list">
            <div class="empty-state">Loading your orders…</div>
        </div>
    </div>
</section>

<footer>
    <div class="container">
        <div>🌱 AgriConnect — Farm to customer platform</div>
        <div><a href="/marketplace.html">Continue shopping</a></div>
    </div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
    renderNav('orders');
    requireCustomer();

    function pillClass(status) {
        return 'pill pill-' + status.toLowerCase();
    }

    async function loadOrders() {
        const list = document.getElementById('orders-list');
        try {
            const orders = await api('/orders');
            if (!orders.length) {
                list.innerHTML = `<div class="empty-state"><div class="icon">📦</div>No orders yet.<br><br><a href="/marketplace.html" class="btn btn-accent">Start shopping</a></div>`;
                return;
            }
            list.innerHTML = orders.map(o => `
                <div class="card" style="margin-bottom:18px;">
                    <div class="flex-between" style="margin-bottom:14px; flex-wrap:wrap; gap:8px;">
                        <div>
                            <strong>Order #${o.id}</strong>
                            <div class="muted" style="font-size:0.85rem">${formatDate(o.orderDate)}</div>
                        </div>
                        <span class="${pillClass(o.status)}">${o.status}</span>
                    </div>
                    <table>
                        <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead>
                        <tbody>
                        ${o.items.map(i => `
                            <tr>
                                <td>${i.product ? i.product.name : 'Product'}</td>
                                <td>${i.quantity}</td>
                                <td class="mono">${formatMoney(i.priceAtOrder)}</td>
                                <td class="mono">${formatMoney(i.subtotal)}</td>
                            </tr>
                        `).join('')}
                        </tbody>
                    </table>
                    <div class="flex-between" style="margin-top:14px; padding-top:14px; border-top:1px solid rgba(34,40,31,0.08);">
                        <span class="muted">Delivering to: ${o.deliveryAddress}</span>
                        <span style="font-weight:700; font-size:1.05rem;">${formatMoney(o.totalAmount)}</span>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            list.innerHTML = `<div class="empty-state">Could not load orders: ${e.message}</div>`;
        }
    }

    loadOrders();
</script>
</body>
</html>
